<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HackVote</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-sidebar {
            width: 280px;
            height: 100vh;
            background: white;
            padding: 40px 20px;
            position: fixed;
            border-right: 1px solid var(--border-color);
        }
        .admin-main { margin-left: 280px; padding: 40px 5%; }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .stat-card i { font-size: 1.5rem; margin-bottom: 10px; color: var(--primary); }
        .stat-num { font-size: 2rem; font-weight: 900; margin-bottom: 5px; }
        .stat-label { color: var(--text-muted); font-weight: 600; font-size: 0.9rem; }
        
        .dashboard-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .admin-card { background: white; padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); height: 100%; }
        
        .leader-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .rank { width: 40px; font-weight: 900; color: var(--primary); font-size: 1.1rem; }
        .leader-info h4 { margin-bottom: 2px; }
        .leader-info span { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; }
        .best-count { margin-left: auto; background: #e0e7ff; color: var(--primary); padding: 5px 12px; border-radius: 20px; font-weight: 900; }
        
        .project-list-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .project-list-table th { text-align: left; padding: 15px; background: #f8fafc; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; }
        .project-list-table td { padding: 15px; border-bottom: 1px solid var(--border-color); }
        .total-pill { background: var(--secondary); color: white; padding: 4px 10px; border-radius: 10px; font-weight: 600; font-size: 0.85rem; }
    </style>
</head>
<body class="staggered-entry">
    <div id="toast-container"></div>
    
    <div class="admin-sidebar">
        <h1 class="gradient-text" style="font-weight: 900; font-size: 1.6rem; margin-bottom: 40px;">ADMIN CONSOLE</h1>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <a href="#" class="btn btn-primary" style="text-align: left; padding: 12px 20px;"><i class="fas fa-chart-line"></i> Intelligence</a>
            <button onclick="logoutAdmin()" class="btn btn-secondary" style="text-align: left; padding: 12px 20px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <main class="admin-main">
        <div style="margin-bottom: 40px;">
            <h2 class="section-title gradient-text" style="margin-bottom: 10px;">Intelligence Dashboard</h2>
            <p style="color: var(--text-muted);">Real-time monitoring of voting engagement across all teams.</p>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <i class="fas fa-layer-group"></i>
                <div class="stat-num" id="stat-total-projects">0</div>
                <div class="stat-label">Total Projects</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-double"></i>
                <div class="stat-num" id="stat-total-votes">0</div>
                <div class="stat-label">Total Votes Cast</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-award"></i>
                <div class="stat-num" id="stat-total-best">0</div>
                <div class="stat-label">Best Votes</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="stat-num" id="stat-total-students">0</div>
                <div class="stat-label">Students Voted</div>
            </div>
        </div>

        <div class="dashboard-row" style="margin-bottom: 40px;">
            <div class="admin-card">
                <h3 style="margin-bottom: 30px;"><i class="fas fa-chart-pie" style="color: var(--secondary);"></i> Voting Mix</h3>
                <canvas id="votingMixChart" height="250"></canvas>
            </div>
            <div class="admin-card">
                <h3 style="margin-bottom: 30px;"><i class="fas fa-trophy" style="color: #fbbf24;"></i> Elite Top 5</h3>
                <div id="top-5-list">
                    <!-- Leaders populated by JS -->
                </div>
            </div>
        </div>

        <div class="admin-card" style="margin-bottom: 40px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Project Management</h3>
                <button class="btn btn-primary" onclick="loadAdminData()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
            </div>
            <table class="project-list-table">
                <thead>
                    <tr>
                        <th>Project & Team</th>
                        <th>Best</th>
                        <th>Good</th>
                        <th>Moderate</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="project-admin-table">
                    <!-- Data populated by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyfL-ANFGJGF7O8ZpFrDSoa_Wmj6Kyy39DzbSEv1tQvx_BCXCj61MwgWezmCFWAFLva9Q/exec";

        document.addEventListener('DOMContentLoaded', () => {
            // Check session
            if (localStorage.getItem('admin_session') !== 'active') {
                window.location.href = 'admin_login.html';
                return;
            }
            loadAdminData();
            // Refresh every 30 seconds
            setInterval(loadAdminData, 30000);
        });

        async function loadAdminData() {
            try {
                console.log("Connecting to Intelligence Hub:", GAS_URL);
                const cacheBuster = `&t=${new Date().getTime()}`;
                const response = await fetch(`${GAS_URL}?action=adminStats${cacheBuster}`);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const data = await response.json();
                console.log("Data Received:", data);
                
                if (data.status === "success") {
                    updateStats(data);
                    renderLeaderboard(data.projects);
                    renderMixedChart(data.mix);
                    renderProjectTable(data.projects);
                } else {
                    alert("GAS ERROR: " + data.message);
                }
            } catch (err) {
                console.error("Dashboard Error:", err);
                alert("DIAGNOSTIC: Failed to connect to Google. \nError: " + err.message);
            }
        }

        function updateStats(data) {
            document.getElementById('stat-total-projects').innerText = data.totalProjects || 0;
            document.getElementById('stat-total-votes').innerText = data.totalVotes || 0;
            document.getElementById('stat-total-best').innerText = data.mix ? data.mix.best : 0;
            document.getElementById('stat-total-students').innerText = data.totalStudents || 0;
        }

        function renderLeaderboard(projects) {
            const list = document.getElementById('top-5-list');
            list.innerHTML = '';
            
            const top5 = [...projects].sort((a, b) => b.totalVotes - a.totalVotes).slice(0, 5);
            
            top5.forEach((p, i) => {
                list.innerHTML += `
                    <div class="leader-item">
                        <div class="rank">#${i+1}</div>
                        <div class="leader-info">
                            <h4>${p.title}</h4>
                            <span>${p.teamName}</span>
                        </div>
                        <div class="best-count">${p.totalVotes} Votes</div>
                    </div>
                `;
            });
        }

        function renderMixedChart(mix) {
            const ctx = document.getElementById('votingMixChart').getContext('2d');
            
            if (window.myChart) window.myChart.destroy();
            
            window.myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Best', 'Good', 'Moderate'],
                    datasets: [{
                        data: [mix.best, mix.good, mix.moderate],
                        backgroundColor: ['#6366f1', '#10b981', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } },
                    cutout: '70%'
                }
            });
        }

        function renderProjectTable(projects) {
            const table = document.getElementById('project-admin-table');
            table.innerHTML = '';
            
            projects.forEach(p => {
                table.innerHTML += `
                    <tr>
                        <td>
                            <div style="font-weight: 800;">${p.title}</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">${p.teamName}</div>
                        </td>
                        <td style="font-weight: 700;">${p.bestCount}</td>
                        <td style="font-weight: 700;">${p.goodCount}</td>
                        <td style="font-weight: 700;">${p.moderateCount}</td>
                        <td><span class="total-pill">${p.totalVotes} Total</span></td>
                    </tr>
                `;
            });
        }

        function logoutAdmin() {
            localStorage.removeItem('admin_session');
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
