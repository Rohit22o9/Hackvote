<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Hackathon Voting</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body class="staggered-entry">
    <div id="toast-container"></div>

    <div class="container" style="max-width: 500px; padding: 100px 20px;">
        <a href="index.html" style="color: var(--primary); font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 8px; margin-bottom: 30px; font-size: 0.9rem;">
            &larr; Back to Home
        </a>
        
        <div class="auth-container card">
            <h2 class="gradient-text" style="font-size: 2.2rem; margin-bottom: 12px; text-align: center; font-weight: 900;">Admin Access</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 35px; line-height: 1.5;">Manage project entries and monitor real-time voting analytics.</p>
            
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="email">ADMIN EMAIL</label>
                    <input type="email" id="email" name="email" placeholder="admin@college.edu" required style="padding: 15px;">
                </div>
                
                <div class="form-group" style="margin-bottom: 30px;">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required style="padding: 15px;">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 15px;">Secure Login &rarr;</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
