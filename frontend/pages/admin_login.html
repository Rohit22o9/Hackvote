<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - HackVote</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-box {
            background: white;
            padding: 50px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--surface-shadow);
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .login-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="staggered-entry" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div id="toast-container"></div>
    
    <div class="login-box">
        <div class="login-icon"><i class="fas fa-user-shield"></i></div>
        <h1 class="gradient-text" style="font-weight: 900; margin-bottom: 5px;">Admin Login</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Access your hackathon voting command center.</p>
        
        <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
            <div class="input-group" style="margin-bottom: 25px; text-align: left;">
                <label style="font-weight: 700; font-size: 0.9rem; color: var(--primary);">ADMIN ID</label>
                <input type="text" id="adminId" placeholder="Enter Admin ID" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); font-weight: 600;" required>
            </div>
            
            <div class="input-group" style="margin-bottom: 35px; text-align: left;">
                <label style="font-weight: 700; font-size: 0.9rem; color: var(--primary);">PASSWORD</label>
                <input type="password" id="adminPass" placeholder="••••••••" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); font-weight: 600;" required>
            </div>
            
            <button class="btn btn-primary" style="width: 100%; padding: 16px; border-radius: 15px; font-weight: 800; font-size: 1rem;">
                SECURE ACCESS <i class="fas fa-lock" style="margin-left: 8px;"></i>
            </button>
        </form>
    </div>

    <script>
        function handleAdminLogin(e) {
            e.preventDefault();
            const id = document.getElementById('adminId').value;
            const pass = document.getElementById('adminPass').value;
            
            // Default Demo Admin Credits
            if (id === "admin" && pass === "admin@iic2k26") {
                localStorage.setItem('admin_session', 'active');
                window.location.href = 'admin.html';
            } else {
                alert("Incorrect Admin Credentials!");
            }
        }
    </script>
</body>
</html>
