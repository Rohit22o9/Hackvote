<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Hackathon Voting</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body class="staggered-entry">
    <div id="toast-container"></div>

    <div class="container" style="max-width: 500px; padding: 100px 20px;">
        <a href="index.html" style="color: var(--primary); font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 8px; margin-bottom: 30px; font-size: 0.9rem;">
            &larr; Back to Home
        </a>
        
        <div class="auth-container card">
            <h2 class="gradient-text" style="font-size: 2.2rem; margin-bottom: 12px; text-align: center; font-weight: 900;">Student Portal</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 35px; line-height: 1.5;">Enter your unique PRN number to start voting for hackathon projects.</p>
            
            <form id="student-login-form" onsubmit="loginStudent(event)">
                <div class="form-group">
                    <label for="prn">PRN NUMBER</label>
                    <input type="text" id="prn" name="prn" placeholder="e.g. 21200123" required autocomplete="off" style="font-size: 1.1rem; padding: 15px;">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 15px; margin-top: 10px;">Login & Continue &rarr;</button>
            </form>
            
            <div style="margin-top: 35px; text-align: center; padding-top: 25px; border-top: 1px solid var(--border-color);">
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">
                    New Student? <a href="pages/signup.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Sign Up</a>
                </p>
                <p style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">
                    🔒 Secure Voting Access
                </p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
